<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA PLATINUM v22.0 - COMPLETE DATABASE</title>
    <style>
        :root { --bg: #0a0a0c; --card: #121215; --neon: #00ff87; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --danger: #ff4444; --blue: #00d4ff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1250px; }
        header { text-align: center; padding: 25px; border-bottom: 1px solid #222; cursor: pointer; }
        h1 span { color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
        #admin { display: none; background: #1a1a1e; padding: 20px; border: 1px solid var(--neon); border-radius: 12px; margin: 20px 0; border-left: 5px solid var(--neon); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .btn { padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; margin: 2px; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--neon); color: #000; }
        .tabs { display: flex; gap: 8px; justify-content: center; margin: 25px 0; flex-wrap: wrap; }
        .tab-btn { background: #222; color: #fff; padding: 10px 25px; border-radius: 30px; border: 1px solid #333; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); border-color: var(--neon); }
        .table-wrapper { background: var(--card); border-radius: 12px; overflow-x: auto; border: 1px solid #222; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 1000px; }
        th { background: #1c1c21; color: #888; padding: 18px; font-size: 10px; text-transform: uppercase; }
        td { padding: 14px 10px; border-bottom: 1px solid #1c1c21; text-align: center; }
        .player-info { display: flex; align-items: center; gap: 12px; text-align: left; }
        .club-img { width: 38px; height: 38px; object-fit: contain; border-radius: 50%; background: #000; border: 2px solid #333; }
        .stars { color: var(--gold); font-size: 14px; margin-left: 5px; }
        .row-edit { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; background: #25252b; padding: 10px; border-radius: 8px; align-items: center; }
        input, select { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; font-size: 11px; }
        .highlight-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 30px; }
        .h-card-horiz { min-width: 220px; background: #1a1a1e; border: 1px solid #222; padding: 15px; border-radius: 10px; border-top: 3px solid var(--blue); flex-shrink: 0; }
        .h-card-horiz i { font-size: 9px; color: var(--neon); display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        .h-card-horiz b { font-size: 16px; color: #fff; display: block; }
        .season-block { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid #333; margin-bottom: 40px; }
        .podium-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .dash-card { background: #1c1c21; border-radius: 12px; padding: 20px; text-align: center; border-bottom: 5px solid #333; }
        .dash-card img { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 12px; border: 3px solid #222; }
        .admin-select { width: 100%; padding: 10px; background: #000; color: var(--neon); border: 1px solid var(--neon); border-radius: 6px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header onclick="openAdmin()">
        <h1>FIFA <span>PLATINUM v22.0</span></h1>
        <p style="color:#555; font-size: 11px; letter-spacing: 3px;">FULL STATS • HALL OF FAME REINSTATED</p>
    </header>

    <div id="admin">
        <select id="admin-editor-selector" class="admin-select" onchange="renderEditor()"></select>
        <div id="editor-container"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-green" onclick="addNewPlayer()" id="add-btn">+ Novo Técnico</button>
            <button class="btn btn-blue" onclick="saveAll()" style="flex:1">SALVAR TUDO</button>
        </div>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-blue" onclick="exportData()" style="flex:1">💾 BACKUP</button>
            <button class="btn btn-blue" onclick="importData()" style="flex:1">📂 IMPORTAR</button>
        </div>
        <button class="btn" onclick="closeSeason()" style="background:#400; color:#f66; width:100%; margin-top:10px;">ENCERRAR TEMPORADA</button>
    </div>

    <div class="tabs">
        <button id="t-tab" class="tab-btn active" onclick="switchTab('tabela')">TEMPORADA</button>
        <button id="r-tab" class="tab-btn" onclick="switchTab('ranking')">RANKING GERAL</button>
        <button id="g-tab" class="tab-btn" onclick="switchTab('galeria')">HALL DA FAMA</button>
    </div>

    <div id="view-tabela">
        <select id="season-selector" onchange="changeView(this.value)" class="admin-select" style="border-color:#333; color:white;"></select>
        <div class="table-wrapper"><table id="table-main"></table></div>
    </div>

    <div id="view-ranking" style="display:none">
        <div class="table-wrapper"><table id="table-ranking"></table></div>
    </div>

    <div id="view-galeria" style="display:none; flex-direction: column;"></div>
</div>

<script>
    const TIMES_DATABASE = [
        { nome: "Real Madrid", logo: "https://upload.wikimedia.org/wikipedia/pt/9/98/Real_Madrid.png" },
        { nome: "Man City", logo: "https://upload.wikimedia.org/wikipedia/pt/0/02/Manchester_City_FC_badge.png" },
        { nome: "Liverpool", logo: "https://upload.wikimedia.org/wikipedia/pt/0/0c/Liverpool_FC.png" },
        { nome: "Barcelona", logo: "https://upload.wikimedia.org/wikipedia/pt/4/43/FCBarcelona.png" },
        { nome: "Bayern", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg/1024px-FC_Bayern_M%C3%BCnchen_logo_%282017%29.svg.png" },
        { nome: "PSG", logo: "https://upload.wikimedia.org/wikipedia/pt/a/a7/Paris_Saint-Germain_Football_Club.png" },
        { nome: "Arsenal", logo: "https://upload.wikimedia.org/wikipedia/pt/5/53/Arsenal_FC.png" },
        { nome: "Inter Milão", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/FC_Internazionale_Milano_2021.svg/1024px-FC_Internazionale_Milano_2021.svg.png" },
        { nome: "AC Milan", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/Logo_of_AC_Milan.svg/1024px-Logo_of_AC_Milan.svg.png" },
        { nome: "Juventus", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Juventus_FC_2017_icon_%28black%29.svg/1024px-Juventus_FC_2017_icon_%28black%29.svg.png" },
        { nome: "Sporting CP", logo: "https://upload.wikimedia.org/wikipedia/pt/3/3e/Sporting_Clube_de_Portugal.png" },
        { nome: "Benfica", logo: "https://upload.wikimedia.org/wikipedia/pt/1/1f/SL_Benfica_logo.png" },
        { nome: "Porto", logo: "https://upload.wikimedia.org/wikipedia/pt/c/c9/FC_Porto.png" }
    ];

    const STORAGE_KEY = 'fifa_ultimate_v22';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { atual: [], historico: [] };
    let currentMode = 'atual';

    function openAdmin() { if(prompt("Senha:") === '123') document.getElementById('admin').style.display='block'; }

    function getStars(name) {
        let titles = db.historico.filter(h => h.dados[0].tecnico === name).length;
        return titles > 0 ? `<span class="stars">${"⭐".repeat(titles)}</span>` : "";
    }

    function switchTab(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-tabela').style.display = mode === 'tabela' ? 'block' : 'none';
        document.getElementById('view-ranking').style.display = mode === 'ranking' ? 'block' : 'none';
        document.getElementById('view-galeria').style.display = mode === 'galeria' ? 'flex' : 'none';
        if(mode === 'tabela') renderTable();
        if(mode === 'ranking') renderRankingGeral();
        if(mode === 'galeria') renderGallery();
        document.getElementById(mode.charAt(0)+'-tab').classList.add('active');
    }

    function calcBaseForca(gp, gc) { return (gp * 3.5) - (gc * 2.5); }

    function renderTable() {
        const selector = document.getElementById('season-selector');
        selector.innerHTML = '<option value="atual">Temporada Ativa</option>';
        db.historico.forEach((h, i) => selector.innerHTML += `<option value="${i}">${h.nome}</option>`);

        let list = currentMode === 'atual' ? [...db.atual] : [...db.historico[currentMode].dados];
        list.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));

        const table = document.getElementById('table-main');
        table.innerHTML = `<thead><tr><th>POS</th><th style="text-align:left">TÉCNICO</th><th>PTS</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GS</th><th>%</th><th>FORÇA</th></tr></thead>
        <tbody>${list.map((j, i) => {
            let pts = (j.v*3)+j.e; let jgs = (j.v+j.e+j.d);
            let apr = jgs > 0 ? ((pts/(jgs*3))*100).toFixed(1) : "0.0";
            let fb = calcBaseForca(j.gp, j.gc);
            let bn = (i===0)?20 : (i===1)?10 : (i===2)?5 : (i===list.length-1 && list.length>3)?-5 : 0;
            return `<tr><td>${i+1}º</td><td class="player-info"><img src="${j.foto||''}" class="club-img"><b>${j.tecnico}</b>${getStars(j.tecnico)}</td><td>${pts}</td><td>${j.v}</td><td>${j.e}</td><td>${j.d}</td><td>${j.gp}</td><td>${j.gc}</td><td>${apr}%</td><td style="color:var(--gold); font-weight:bold">${(fb+bn).toFixed(1)}</td></tr>`;
        }).join('')}</tbody>`;
        
        const adminSel = document.getElementById('admin-editor-selector');
        adminSel.innerHTML = '<option value="atual">Temporada Ativa</option>';
        db.historico.forEach((h, i) => adminSel.innerHTML += `<option value="${i}">Histórico: ${h.nome}</option>`);
    }

    function renderRankingGeral() {
        let stats = {};
        const process = (lista) => {
            lista.forEach((j, i) => {
                if(!stats[j.tecnico]) stats[j.tecnico] = { t:j.tecnico, p:0, j:0, v:0, e:0, d:0, gp:0, gc:0, pts:0, f:0 };
                let s = stats[j.tecnico]; s.p++; s.j += (j.v+j.e+j.d); s.v += j.v; s.e += j.e; s.d += j.d; s.gp += j.gp; s.gc += j.gc; s.pts += ((j.v*3)+j.e);
                let bn = (i===0)?20:(i===1)?10:(i===2)?5:(i===lista.length-1 && lista.length>3)?-5:0;
                s.f += (calcBaseForca(j.gp, j.gc) + bn);
            });
        };
        db.historico.forEach(h => process(h.dados));
        process(db.atual);
        let sorted = Object.values(stats).sort((a,b) => b.pts - a.pts);

        document.getElementById('table-ranking').innerHTML = `<thead><tr><th>POS</th><th style="text-align:left">TÉCNICO</th><th>TÍTULOS</th><th>PART</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GS</th><th>FORÇA TOTAL</th></tr></thead>
        <tbody>${sorted.map((j, i) => `<tr><td>${i+1}º</td><td style="text-align:left"><b>${j.t}</b></td><td>${getStars(j.t)}</td><td>${j.p}</td><td>${j.j}</td><td>${j.v}</td><td>${j.e}</td><td style="color:var(--danger)">${j.d}</td><td>${j.gp}</td><td>${j.gc}</td><td style="color:var(--gold); font-weight:bold">${j.f.toFixed(1)}</td></tr>`).join('')}</tbody>`;
    }

    function renderGallery() {
        const gal = document.getElementById('view-galeria');
        if(!db.historico.length) { gal.innerHTML = "<p style='text-align:center'>Histórico Vazio.</p>"; return; }
        
        let s = {}; let medalhas = {};
        db.historico.forEach(h => {
            h.dados.forEach((j, pos) => {
                if(!s[j.tecnico]) s[j.tecnico] = { t:j.tecnico, v:0, gp:0, gc:0, d:0, j:0 };
                if(!medalhas[j.tecnico]) medalhas[j.tecnico] = { o:0, p:0, b:0, l:0, forcaSum: 0 };
                let x = s[j.tecnico]; x.v += j.v; x.gp += j.gp; x.gc += j.gc; x.d += j.d; x.j += (j.v+j.e+j.d);
                let bn = (pos===0)?20:(pos===1)?10:(pos===2)?5:(pos===h.dados.length-1)?-5:0;
                medalhas[j.tecnico].forcaSum += (calcBaseForca(j.gp, j.gc) + bn);
                if(pos===0) medalhas[j.tecnico].o++;
                else if(pos===1) medalhas[j.tecnico].p++;
                else if(pos===2) medalhas[j.tecnico].b++;
                if(pos===h.dados.length-1) medalhas[j.tecnico].l++;
            });
        });

        let list = Object.values(s);
        let mv = list.sort((a,b) => b.v - a.v)[0];
        let ag = list.sort((a,b) => b.gp - a.gp)[0];

        let html = `<div class="highlight-row">
            <div class="h-card-horiz"><i>🏆 MAIS VITORIOSO</i><b>${mv.t}</b><span>${mv.v} Vitórias</span></div>
            <div class="h-card-horiz"><i>⚽ MAIOR ARTILHEIRO</i><b>${ag.t}</b><span>${ag.gp} Golos</span></div>
        </div>
        <div class="table-wrapper">
            <table><thead><tr><th>TÉCNICO</th><th>🥇 OURO</th><th>🥈 PRATA</th><th>🥉 BRONZE</th><th>💩 LANTERNA</th><th>FORÇA MÉDIA</th></tr></thead>
            <tbody>${Object.entries(medalhas).sort((a,b) => b[1].o - a[1].o || b[1].p - a[1].p).map(([n, m]) => {
                let totalPart = m.o+m.p+m.b+m.l;
                return `<tr><td><b>${n}</b></td><td style="color:var(--gold)">${m.o}</td><td style="color:var(--silver)">${m.p}</td><td style="color:var(--bronze)">${m.b}</td><td style="color:var(--danger)">${m.l}</td><td style="color:var(--neon)">${(m.forcaSum/totalPart).toFixed(1)}</td></tr>`
            }).join('')}</tbody></table>
        </div>`;

        html += db.historico.map(h => {
            const d = h.dados; const lan = d[d.length-1];
            return `<div class="season-block"><div style="color:var(--neon); margin-bottom:20px; font-weight:bold;">🏆 ${h.nome}</div><div class="podium-dashboard"><div class="dash-card"><img src="${d[0].foto}"><div>🥇 1º</div><h4>${d[0].tecnico}</h4></div><div class="dash-card"><img src="${lan.foto}"><div>💩 LANTERNA</div><h4>${lan.tecnico}</h4></div></div></div>`;
        }).reverse().join('');
        gal.innerHTML = html;
    }

    function renderEditor() {
        const mode = document.getElementById('admin-editor-selector').value;
        const container = document.getElementById('editor-container');
        const targetList = mode === 'atual' ? db.atual : db.historico[mode].dados;
        document.getElementById('add-btn').style.display = mode === 'atual' ? 'block' : 'none';

        container.innerHTML = targetList.map((j, i) => `
        <div class="row-edit">
            <input style="width:110px" type="text" value="${j.tecnico}" onchange="updateMember('${mode}', ${i}, 'tecnico', this.value)">
            <select style="width:130px" onchange="applyClub('${mode}', ${i}, this.value)">
                <option value="">Equipa...</option>
                ${TIMES_DATABASE.map(t => `<option value="${t.logo}" ${j.foto === t.logo ? 'selected' : ''}>${t.nome}</option>`).join('')}
            </select>
            V<input type="number" style="width:35px" value="${j.v}" onchange="updateMember('${mode}', ${i}, 'v', parseInt(this.value))">
            E<input type="number" style="width:35px" value="${j.e}" onchange="updateMember('${mode}', ${i}, 'e', parseInt(this.value))">
            D<input type="number" style="width:35px" value="${j.d||0}" onchange="updateMember('${mode}', ${i}, 'd', parseInt(this.value))">
            GP<input type="number" style="width:35px" value="${j.gp}" onchange="updateMember('${mode}', ${i}, 'gp', parseInt(this.value))">
            GS<input type="number" style="width:35px" value="${j.gc}" onchange="updateMember('${mode}', ${i}, 'gc', parseInt(this.value))">
            ${mode === 'atual' ? `<button onclick="db.atual.splice(${i},1);renderEditor()" style="color:red">X</button>` : ''}
        </div>`).join('');
    }

    function applyClub(m, i, l) { if(l) { updateMember(m, i, 'foto', l); renderEditor(); } }
    function updateMember(m, idx, f, v) { if(m==='atual') db.atual[idx][f]=v; else db.historico[m].dados[idx][f]=v; }
    function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); renderTable(); alert("Salvo!"); }
    function addNewPlayer() { db.atual.push({tecnico: "Novo", foto: "", v:0, e:0, d:0, gp:0, gc:0}); renderEditor(); }
    function changeView(v) { currentMode = v; renderTable(); }
    function exportData() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type:'application/json'})); a.download = 'fifa_database.json'; a.click(); }
    function importData() { const f = document.createElement('input'); f.type = 'file'; f.onchange = e => { const r = new FileReader(); r.readAsText(e.target.files[0]); r.onload = ev => { db = JSON.parse(ev.target.result); saveAll(); location.reload(); }; }; f.click(); }
    function closeSeason() { let n = prompt("Nome da Época:"); if(n && db.atual.length > 0) { db.atual.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc)); db.historico.push({ nome: n, dados: JSON.parse(JSON.stringify(db.atual)) }); db.atual = db.atual.map(j => ({...j, v:0, e:0, d:0, gp:0, gc:0})); saveAll(); } }
    renderTable();
    renderEditor();
</script>
</body>
</html>
